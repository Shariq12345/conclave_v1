version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: conclave-server
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      # Mount the sqlite databases for persistence
      - ./conclave.db:/app/conclave.db
      - ./conclave_metrics.db:/app/conclave_metrics.db
    environment:
      - CONCLAVE_SERVER_HOST=0.0.0.0
      - CONCLAVE_SERVER_PORT=8000
      - TESTING=false

  node-a:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: conclave-node-a
    depends_on:
      - server
    environment:
      - CONCLAVE_SERVER_URL=http://server:8000
      # Auto-registration credentials (fallback if node has not registered)
      - CONCLAVE_USERNAME=admin
      - CONCLAVE_PASSWORD=adminpass
      - NODE_NAME=Hospital_A_Node
      - HEARTBEAT_INTERVAL=10
    volumes:
      # Mount configuration/certificates volume separately for client A
      - ./volumes/node-a-config:/root/.conclave
      # Mount data volume separately for client A
      - ./volumes/node-a-data:/root/.conclave/data

  node-b:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: conclave-node-b
    depends_on:
      - server
    environment:
      - CONCLAVE_SERVER_URL=http://server:8000
      # Auto-registration credentials (fallback if node has not registered)
      - CONCLAVE_USERNAME=admin
      - CONCLAVE_PASSWORD=adminpass
      - NODE_NAME=Hospital_B_Node
      - HEARTBEAT_INTERVAL=10
    volumes:
      # Mount configuration/certificates volume separately for client B
      - ./volumes/node-b-config:/root/.conclave
      # Mount data volume separately for client B
      - ./volumes/node-b-data:/root/.conclave/data
